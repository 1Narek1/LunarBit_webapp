<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LunarBit</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0e1a; --surface: #111827; --card: #151e2e;
  --border: #1e2d45; --accent: #00e5ff; --green: #00e676;
  --red: #ff1744; --yellow: #ffea00; --purple: #7c3aed;
  --text: #e2e8f0; --muted: #64748b;
}
body { background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; overflow-x:hidden; }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); display:flex; padding:8px 0 12px; z-index:100; }
.nav-btn { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; color:var(--muted); font-size:10px; cursor:pointer; padding:4px 0; }
.nav-btn.active { color:var(--accent); }
.nav-icon { font-size:22px; }
.page { display:none; padding:16px; padding-bottom:80px; }
.page.active { display:block; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.page-title { font-size:20px; font-weight:700; background:linear-gradient(135deg,#a78bfa,#00e5ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.live-badge { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--green); background:rgba(0,230,118,0.1); padding:4px 10px; border-radius:20px; }
.dot { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.refresh-btn { background:rgba(0,229,255,0.1); border:1px solid rgba(0,229,255,0.3); color:var(--accent); border-radius:20px; padding:4px 12px; font-size:13px; cursor:pointer; }
.stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:16px; }
.stat-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 8px; text-align:center; }
.stat-val { font-size:18px; font-weight:700; color:var(--accent); font-family:monospace; }
.stat-lbl { font-size:9px; color:var(--muted); margin-top:2px; text-transform:uppercase; }
.filter-row { display:flex; gap:6px; overflow-x:auto; scrollbar-width:none; margin-bottom:12px; }
.filter-row::-webkit-scrollbar { display:none; }
.chip { flex-shrink:0; padding:5px 12px; border-radius:20px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:12px; cursor:pointer; }
.chip.active { border-color:var(--accent); color:var(--accent); background:rgba(0,229,255,0.06); }
.opp-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px; margin-bottom:8px; position:relative; overflow:hidden; }
.opp-card.hot { border-color:rgba(0,230,118,0.3); }
.lock-overlay { position:absolute; inset:0; background:rgba(10,14,26,0.85); display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:12px; cursor:pointer; }
.lock-icon { font-size:28px; margin-bottom:6px; }
.lock-text { font-size:13px; color:var(--accent); font-weight:600; }
.opp-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
.opp-pair { font-size:15px; font-weight:700; }
.opp-spread { font-size:18px; font-weight:700; color:var(--green); font-family:monospace; }
.opp-route { display:flex; align-items:center; gap:6px; margin-bottom:8px; }
.ex-badge { padding:3px 8px; border-radius:6px; font-size:11px; font-weight:700; font-family:monospace; background:#1e2d45; color:#00e5ff; }
.opp-prices { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding-top:8px; border-top:1px solid var(--border); }
.price-item .plbl { font-size:10px; color:var(--muted); }
.price-item .pval { font-size:12px; font-family:monospace; margin-top:1px; }
.calc-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px; }
.calc-label { font-size:13px; color:var(--muted); margin-bottom:8px; }
.calc-input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; color:var(--text); font-size:18px; font-family:monospace; outline:none; }
.calc-input:focus { border-color:var(--accent); }
.calc-result { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:8px; }
.calc-row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid var(--border); font-size:13px; }
.calc-row:last-child { border-bottom:none; }
.calc-row .label { color:var(--muted); }
.calc-row .value { font-family:monospace; font-weight:600; }
.calc-row .value.green { color:var(--green); }
.calc-row .value.yellow { color:var(--yellow); }
.edu-module { background:var(--card); border:1px solid var(--border); border-radius:14px; margin-bottom:12px; overflow:hidden; }
.edu-module-header { display:flex; align-items:center; justify-content:space-between; padding:16px; cursor:pointer; }
.edu-module-left { display:flex; align-items:center; gap:12px; }
.edu-module-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:22px; flex-shrink:0; }
.edu-module-title { font-size:15px; font-weight:700; }
.edu-module-subtitle { font-size:11px; color:var(--muted); margin-top:2px; }
.edu-module-arrow { color:var(--muted); font-size:18px; transition:transform .2s; flex-shrink:0; }
.edu-module.open .edu-module-arrow { transform:rotate(90deg); }
.edu-module-body { display:none; padding:0 16px 16px; }
.edu-module.open .edu-module-body { display:block; }
.edu-lesson { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; overflow:hidden; }
.edu-lesson-header { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; }
.edu-lesson-title { font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px; }
.edu-lesson-arrow { color:var(--muted); font-size:14px; transition:transform .2s; }
.edu-lesson.open .edu-lesson-arrow { transform:rotate(90deg); }
.edu-lesson-body { display:none; padding:0 14px 14px; font-size:13px; line-height:1.8; color:#94a3b8; }
.edu-lesson.open .edu-lesson-body { display:block; }
.edu-lesson-body p { margin-bottom:10px; }
.edu-lesson-body strong { color:var(--text); }
.edu-step { display:flex; gap:10px; margin-bottom:12px; align-items:flex-start; }
.edu-step-num { width:26px; height:26px; border-radius:50%; background:var(--purple); color:white; font-size:12px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
.edu-step-text { flex:1; }
.edu-tip { background:rgba(0,229,255,0.08); border:1px solid rgba(0,229,255,0.2); border-radius:8px; padding:10px 12px; margin:10px 0; font-size:12px; color:var(--accent); }
.edu-warning { background:rgba(255,23,68,0.08); border:1px solid rgba(255,23,68,0.2); border-radius:8px; padding:10px 12px; margin:10px 0; font-size:12px; color:#ff6b6b; }
.edu-example { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px; margin:10px 0; font-family:monospace; font-size:12px; white-space:pre-wrap; }
.edu-progress { display:flex; align-items:center; gap:6px; margin-bottom:16px; }
.edu-progress-bar { flex:1; height:4px; background:var(--border); border-radius:2px; overflow:hidden; }
.edu-progress-fill { height:100%; background:linear-gradient(90deg,var(--purple),var(--accent)); border-radius:2px; transition:width .3s; }
.edu-progress-text { font-size:11px; color:var(--muted); white-space:nowrap; }
.profile-card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:10px; }
.profile-plan { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.plan-badge { padding:6px 16px; border-radius:20px; font-size:14px; font-weight:700; }
.plan-free { background:rgba(100,116,139,0.2); color:var(--muted); }
.plan-basic { background:rgba(251,191,36,0.2); color:#fbbf24; }
.plan-pro { background:rgba(239,68,68,0.2); color:#ef4444; }
.profile-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:13px; }
.profile-row:last-child { border-bottom:none; }
.profile-row .plbl { color:var(--muted); }
.profile-row .pval { font-family:monospace; font-weight:600; }
.btn-primary { width:100%; background:linear-gradient(135deg,var(--purple),var(--accent)); color:white; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:700; cursor:pointer; margin-top:10px; }
.ref-box { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-family:monospace; font-size:11px; color:var(--accent); word-break:break-all; margin-top:8px; cursor:pointer; }
.lang-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; display:flex; align-items:center; justify-content:center; }
.lang-modal { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:24px; width:280px; }
.lang-title { text-align:center; font-size:18px; font-weight:700; margin-bottom:20px; }
.lang-btn { width:100%; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px; color:var(--text); font-size:15px; cursor:pointer; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.loading { text-align:center; padding:40px; color:var(--muted); font-size:13px; }
.spinner { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }
.empty { text-align:center; padding:40px 20px; color:var(--muted); }
.no-data { text-align:center; padding:20px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<div class="lang-overlay" id="langOverlay" style="display:none">
  <div class="lang-modal">
    <div class="lang-title">🌍 Choose Language</div>
    <button class="lang-btn" onclick="setLang('ru')">🇷🇺 Русский</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 English</button>
    <button class="lang-btn" onclick="setLang('am')">🇦🇲 Հայերեն</button>
  </div>
</div>

<div class="page active" id="pageSpreads">
  <div class="page-header">
    <div class="page-title">🌙 LunarBit</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="refresh-btn" onclick="refreshSpreads()">🔄</button>
      <div class="live-badge"><div class="dot"></div>Live</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl" id="lblSignals">Signals</div></div>
    <div class="stat-card"><div class="stat-val" id="statBest">—</div><div class="stat-lbl" id="lblBest">Best</div></div>
    <div class="stat-card"><div class="stat-val" id="statPlan">—</div><div class="stat-lbl" id="lblPlan">Plan</div></div>
  </div>
  <div class="filter-row">
    <button class="chip active" onclick="setFilter('all',this)" id="chipAll">All</button>
    <button class="chip" onclick="setFilter('cex',this)" id="chipCex">CEX</button>
    <button class="chip" onclick="setFilter('dex',this)" id="chipDex">DEX 🔒</button>
  </div>
  <div id="spreadsList"><div class="loading"><div class="spinner"></div><span id="lblLoading">Loading...</span></div></div>
</div>

<div class="page" id="pageCalc">
  <div class="page-header"><div class="page-title" id="lblCalcTitle">Calculator</div></div>
  <div class="calc-card">
    <div class="calc-label" id="lblCapital">Your capital (USDT)</div>
    <input class="calc-input" type="number" id="capitalInput" value="1000" oninput="calcUpdate()">
  </div>
  <div id="calcResults"><div class="empty" id="lblCalcEmpty">Enter capital</div></div>
</div>

<div class="page" id="pageEdu">
  <div class="page-header"><div class="page-title" id="lblEduTitle">Education</div></div>
  <div class="edu-progress">
    <div class="edu-progress-bar"><div class="edu-progress-fill" id="eduProgressFill" style="width:0%"></div></div>
    <div class="edu-progress-text" id="eduProgressText">0/0</div>
  </div>
  <div id="eduContent"></div>
</div>

<div class="page" id="pageProfile">
  <div class="page-header"><div class="page-title" id="lblProfileTitle">Profile</div></div>
  <div class="profile-card">
    <div class="profile-plan">
      <div id="lblYourPlan">Your plan</div>
      <div class="plan-badge plan-free" id="planBadge">Free</div>
    </div>
    <div class="profile-row"><div class="plbl" id="lblExpires">Expires</div><div class="pval" id="profileExpires">—</div></div>
    <div class="profile-row"><div class="plbl" id="lblScans">Scans today</div><div class="pval" id="profileScans">—</div></div>
    <div class="profile-row"><div class="plbl" id="lblRefs">Friends invited</div><div class="pval" id="profileRefs">0</div></div>
  </div>
  <div class="profile-card">
    <div style="font-size:13px;color:var(--muted);margin-bottom:8px" id="lblRefLink">Referral link</div>
    <div class="ref-box" id="refLink" onclick="copyRef()">—</div>
    <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:center" id="lblCopyHint">Tap to copy</div>
  </div>
  <button class="btn-primary" onclick="openBot()" id="btnOpenBot">🤖 Open Bot</button>
  <button class="btn-primary" style="margin-top:8px;background:linear-gradient(135deg,#f59e0b,#ef4444)" onclick="openPremium()" id="btnPremium">⭐ Premium</button>
  <button class="btn-primary" style="margin-top:8px;background:var(--surface);border:1px solid var(--border);color:var(--text)" onclick="showLangOverlay()" id="btnLang">🌍 Language</button>
</div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="navSpreads" onclick="switchPage('Spreads')"><span class="nav-icon">📊</span><span id="navLblSpreads">Spreads</span></button>
  <button class="nav-btn" id="navCalc" onclick="switchPage('Calc')"><span class="nav-icon">🧮</span><span id="navLblCalc">Calc</span></button>
  <button class="nav-btn" id="navEdu" onclick="switchPage('Edu')"><span class="nav-icon">📚</span><span id="navLblEdu">Education</span></button>
  <button class="nav-btn" id="navProfile" onclick="switchPage('Profile')"><span class="nav-icon">👤</span><span id="navLblProfile">Profile</span></button>
</nav>

};

// ── INIT ─────────────────────────────────────────────────
window.onload = async () => {
  // Сохраняем язык в Telegram CloudStorage
  if (tg.CloudStorage) {
    tg.CloudStorage.getItem('lb_lang', (err, val) => {
      lang = val || localStorage.getItem('lb_lang') || null;
      if (!lang) {
        document.getElementById('langOverlay').style.display = 'flex';
      } else {
        init();
      }
    });
  } else {
    lang = localStorage.getItem('lb_lang') || null;
    if (!lang) {
      document.getElementById('langOverlay').style.display = 'flex';
    } else {
      init();
    }
  }
};

function setLang(l) {
  lang = l;
  localStorage.setItem('lb_lang', l);
  if (tg.CloudStorage) {
    tg.CloudStorage.setItem('lb_lang', l);
  }
  document.getElementById('langOverlay').style.display = 'none';
  init();
}

function showLangOverlay() {
  document.getElementById('langOverlay').style.display = 'flex';
}

async function init() {
  applyTranslations();
  renderEdu();
  await loadUser();
  await loadSpreads();
  calcUpdate();
  setInterval(loadSpreads, 30000);
}

function applyTranslations() {
  const ids = {
    lblSignals:'signals', lblBest:'best', lblPlan:'plan',
    lblLoading:'loading', chipAll:'all', chipCex:'cex',
    lblCalcTitle:'calcTitle', lblCapital:'capital', lblCalcEmpty:'calcEmpty',
    lblEduTitle:'eduTitle', lblProfileTitle:'profileTitle',
    lblYourPlan:'yourPlan', lblExpires:'expires', lblScans:'scans',
    lblRefs:'refs', lblRefLink:'refLink', lblCopyHint:'copyHint',
    btnOpenBot:'openBot', btnPremium:'premium', btnLang:'changeLang',
    navLblSpreads:'navSpreads', navLblCalc:'navCalc',
    navLblEdu:'navEdu', navLblProfile:'navProfile',
  };
  for (const [id, key] of Object.entries(ids)) {
    const el = document.getElementById(id);
    if (el) el.textContent = t(key);
  }
  document.getElementById('chipDex').textContent = 'DEX 🔒';
}

async function loadUser() {
  if (!userId) {
    document.getElementById('refLink').textContent = t('noProfile');
    return;
  }
  try {
    const r = await fetch(`${API}/api/user/${userId}`);
    if (!r.ok) throw new Error('API error');
    userData = await r.json();
    userPlan = userData.plan || 'free';

    const planNames = {free:t('planFree'), basic:t('planBasic'), pro:t('planPro')};
    const planName = planNames[userPlan] || t('planFree');

    document.getElementById('statPlan').textContent = planName;
    const badge = document.getElementById('planBadge');
    badge.textContent = planName;
    badge.className = `plan-badge plan-${userPlan}`;

    document.getElementById('profileExpires').textContent = userData.expires || '—';
    document.getElementById('profileScans').textContent = userData.scan_count !== undefined ? userData.scan_count : '—';
    document.getElementById('profileRefs').textContent = userData.ref_count || 0;

    // Реферальная ссылка
    const refCode = `REF${userId}`;
    const refUrl = `https://t.me/${BOT_USERNAME}?start=${refCode}`;
    document.getElementById('refLink').textContent = refUrl;
  } catch(e) {
    document.getElementById('refLink').textContent = `https://t.me/${BOT_USERNAME}?start=REF${userId}`;
    document.getElementById('statPlan').textContent = t('planFree');
  }
}

async function loadSpreads() {
  try {
    const url = userId ? `${API}/api/spreads?user_id=${userId}` : `${API}/api/spreads`;
    const r = await fetch(url);
    if (!r.ok) throw new Error('API error');
    const data = await r.json();
    spreadsData = data.spreads || [];
    const unlocked = spreadsData.filter(s=>!s.locked);
    document.getElementById('statTotal').textContent = unlocked.length;
    const best = unlocked[0];
    document.getElementById('statBest').textContent = best ? `+${best.spread.toFixed(2)}%` : '—';
    renderSpreads();
    calcUpdate();
  } catch(e) {
    document.getElementById('spreadsList').innerHTML = `<div class="empty">${t('noOpps')}<br><br><button onclick="refreshSpreads()" style="background:rgba(0,229,255,0.1);border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer;margin-top:8px">${t('refresh')}</button></div>`;
  }
}

async function refreshSpreads() {
  document.getElementById('spreadsList').innerHTML = `<div class="loading"><div class="spinner"></div><span>${t('loading')}</span></div>`;
  await loadSpreads();
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  renderSpreads();
}

function renderSpreads() {
  const list = document.getElementById('spreadsList');
  let data = [...spreadsData];
  if (activeFilter==='cex') data = data.filter(s=>!s.is_dex);
  if (activeFilter==='dex') data = data.filter(s=>s.is_dex);

  if (!data.length) {
    list.innerHTML = `<div class="empty">${t('noOpps')}<br><br><button onclick="refreshSpreads()" style="background:rgba(0,229,255,0.1);border:1px solid var(--accent);color:var(--accent);border-radius:20px;padding:8px 20px;font-size:13px;cursor:pointer">${t('refresh')}</button></div>`;
    return;
  }

  list.innerHTML = data.slice(0,30).map(s => {
    const hot = s.spread >= 0.8;
    const lockText = s.lock_reason==='pro' ? t('lockedPro') : t('lockedBasic');
    const buyPrice = s.buy_p < 0.01 ? s.buy_p.toFixed(8) : formatP(s.buy_p);
    const sellPrice = s.sell_p < 0.01 ? s.sell_p.toFixed(8) : formatP(s.sell_p);
    return `<div class="opp-card${hot?' hot':''}">
      <div class="opp-top">
        <div class="opp-pair">${s.sym}/USDT${hot?' 🔥':''}</div>
        <div class="opp-spread">+${s.spread.toFixed(2)}%</div>
      </div>
      <div class="opp-route">
        <span class="ex-badge">${s.buy_ex}</span>
        <span style="color:#64748b">→</span>
        <span class="ex-badge" style="color:#00e676">${s.sell_ex}</span>
      </div>
      <div class="opp-prices">
        <div class="price-item"><div class="plbl">${t('buy')}</div><div class="pval">$${buyPrice}</div></div>
        <div class="price-item"><div class="plbl">${t('sell')}</div><div class="pval">$${sellPrice}</div></div>
      </div>
      ${s.locked?`<div class="lock-overlay" onclick="openPremium()"><div class="lock-icon">🔒</div><div class="lock-text">${lockText}</div></div>`:''}
    </div>`;
  }).join('');
}

function calcUpdate() {
  const capital = parseFloat(document.getElementById('capitalInput').value)||0;
  const container = document.getElementById('calcResults');
  if (!capital||!spreadsData.length) {
    container.innerHTML=`<div class="empty">${t('calcEmpty')}</div>`;
    return;
  }
  const unlocked = spreadsData.filter(s=>!s.locked).slice(0,5);
  if (!unlocked.length) {
    container.innerHTML=`<div class="empty">${t('noOpps')}</div>`;
    return;
  }
  container.innerHTML = unlocked.map(s=>{
    const gross = s.spread/100*capital;
    const fees = capital*0.002;
    const net = gross-fees;
    return `<div class="calc-result">
      <div style="font-weight:700;margin-bottom:8px">${s.sym}/USDT</div>
      <div class="calc-row"><div class="label">${t('spread')}</div><div class="value">+${s.spread.toFixed(2)}%</div></div>
      <div class="calc-row"><div class="label">${t('profit')}</div><div class="value yellow">$${gross.toFixed(2)}</div></div>
      <div class="calc-row"><div class="label">${t('fees')}</div><div class="value" style="color:var(--red)">-$${fees.toFixed(2)}</div></div>
      <div class="calc-row"><div class="label">${t('net')}</div><div class="value ${net>0?'green':''}">${net>0?'+':''}$${net.toFixed(2)}</div></div>
    </div>`;
  }).join('');
}

function renderEdu() {
  const modules = EDU[lang]||EDU['en'];
  const total = modules.reduce((s,m)=>s+m.lessons.length,0);
  document.getElementById('eduContent').innerHTML = modules.map((m,mi)=>`
    <div class="edu-module" id="mod${mi}">
      <div class="edu-module-header" onclick="toggleModule(${mi})">
        <div class="edu-module-left">
          <div class="edu-module-icon" style="background:${m.color}22;border:1px solid ${m.color}44">${m.icon}</div>
          <div>
            <div class="edu-module-title">${m.title}</div>
            <div class="edu-module-subtitle">${m.subtitle} • ${m.lessons.length} ${lang==='am'?'դաս':lang==='ru'?'урока':'lessons'}</div>
          </div>
        </div>
        <div class="edu-module-arrow">›</div>
      </div>
      <div class="edu-module-body">
        ${m.lessons.map((l,li)=>`
          <div class="edu-lesson" id="les${mi}_${li}">
            <div class="edu-lesson-header" onclick="toggleLesson(${mi},${li})">
              <div class="edu-lesson-title">${l.icon} ${l.title}</div>
              <div class="edu-lesson-arrow">›</div>
            </div>
            <div class="edu-lesson-body">${l.body}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
  updateProgress(total);
}

function toggleModule(i) {
  document.getElementById(`mod${i}`).classList.toggle('open');
}

function toggleLesson(mi, li) {
  const les = document.getElementById(`les${mi}_${li}`);
  les.classList.toggle('open');
  if (les.classList.contains('open')) openedLessons.add(`${mi}_${li}`);
  const modules = EDU[lang]||EDU['en'];
  const total = modules.reduce((s,m)=>s+m.lessons.length,0);
  updateProgress(total);
}

function updateProgress(total) {
  const pct = total>0 ? Math.round(openedLessons.size/total*100) : 0;
  document.getElementById('eduProgressFill').style.width = pct+'%';
  document.getElementById('eduProgressText').textContent = `${openedLessons.size}/${total} ${t('progress')}`;
}

function switchPage(name) {
  ['Spreads','Calc','Edu','Profile'].forEach(p=>{
    document.getElementById(`page${p}`).classList.remove('active');
    document.getElementById(`nav${p}`).classList.remove('active');
  });
  document.getElementById(`page${name}`).classList.add('active');
  document.getElementById(`nav${name}`).classList.add('active');
}

function formatP(p) {
  if (!p) return '—';
  if (p>=1000) return p.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (p>=1) return p.toFixed(4);
  if (p>=0.01) return p.toFixed(6);
  return p.toFixed(8);
}

function openBot() { tg.openTelegramLink(BOT); }
function openPremium() { tg.openTelegramLink(`${BOT}?start=premium`); }

function copyRef() {
  const text = document.getElementById('refLink').textContent;
  if (text === t('noProfile')) return;
  navigator.clipboard.writeText(text).then(()=>{
    tg.showAlert(t('copied'));
  }).catch(()=>{
    tg.showAlert(text);
  });
}
</script>
</body>
</html>
